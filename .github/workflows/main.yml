name: Build Android APK

on:
  push:
  workflow_dispatch:
    inputs:
      zip_file:
        description: 'Path to ZIP file (leave empty to auto-detect or build repo directly)'
        required: false
        default: ''

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # ══════════════════════════════════════════════
      # 1. Checkout
      # ══════════════════════════════════════════════
      - name: Checkout repository
        uses: actions/checkout@v4

      # ══════════════════════════════════════════════
      # 2. Java 17
      # ══════════════════════════════════════════════
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ══════════════════════════════════════════════
      # 3. Locate Android project
      # ══════════════════════════════════════════════
      - name: Locate Android project
        id: locate
        run: |
          set -e
          ZIP_INPUT="${{ github.event.inputs.zip_file }}"
          WORK_DIR="$GITHUB_WORKSPACE"

          if [ -n "$ZIP_INPUT" ] && [ -f "$ZIP_INPUT" ]; then
            ZIP="$ZIP_INPUT"
          else
            ZIP=$(find "$WORK_DIR" -maxdepth 2 -name "*.zip" | head -n 1)
          fi

          if [ -n "$ZIP" ]; then
            echo "Found ZIP: $ZIP"
            mkdir -p "$WORK_DIR/extracted_project"
            unzip -o "$ZIP" -d "$WORK_DIR/extracted_project"
            SEARCH_ROOT="$WORK_DIR/extracted_project"
          else
            echo "No ZIP — using repository directly."
            SEARCH_ROOT="$WORK_DIR"
          fi

          SETTINGS=$(find "$SEARCH_ROOT" \
            \( -name "settings.gradle" -o -name "settings.gradle.kts" \) \
            | head -n 1)

          if [ -z "$SETTINGS" ]; then
            echo "ERROR: Cannot locate settings.gradle"
            find "$SEARCH_ROOT" -type f | head -60
            exit 1
          fi

          PROJECT_ROOT=$(dirname "$SETTINGS")
          echo "Android project root: $PROJECT_ROOT"
          echo "project_root=$PROJECT_ROOT" >> $GITHUB_OUTPUT

      # ══════════════════════════════════════════════
      # 4. Fix Gradle repositories (JitPack etc.)
      # ══════════════════════════════════════════════
      - name: Fix Gradle repositories
        run: |
          ROOT="${{ steps.locate.outputs.project_root }}"

          patch_file() {
            local FILE="$1"
            local JITPACK_LINE="$2"
            [ -f "$FILE" ] || return 0
            grep -q "jitpack.io" "$FILE" && return 0
            python3 - "$FILE" "$JITPACK_LINE" <<'PYEOF'
          import sys, re
          file, ins = sys.argv[1], sys.argv[2]
          c = open(file).read()
          for pat in [
              r'(dependencyResolutionManagement\s*\{[^}]*repositories\s*\{)',
              r'(allprojects\s*\{[^}]*repositories\s*\{)',
          ]:
              m = re.search(pat, c, re.DOTALL)
              if m:
                  c = c[:m.end()] + '\n' + ins + c[m.end():]
                  open(file,'w').write(c)
                  print(f"  -> jitpack injected into {file}")
                  break
          PYEOF
          }

          patch_file "$ROOT/settings.gradle"     '        maven { url "https://jitpack.io" }'
          patch_file "$ROOT/settings.gradle.kts" '        maven { url = uri("https://jitpack.io") }'
          patch_file "$ROOT/build.gradle"         '        maven { url "https://jitpack.io" }'
          patch_file "$ROOT/build.gradle.kts"    '        maven { url = uri("https://jitpack.io") }'

          if ! grep -rq "jitpack.io" "$ROOT" 2>/dev/null; then
            echo "LAST RESORT: appending repositories block"
            cat >> "$ROOT/settings.gradle" <<'GRADLE'

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
              repositories {
                  google()
                  mavenCentral()
                  maven { url "https://jitpack.io" }
              }
          }
          GRADLE
          fi

      # ══════════════════════════════════════════════
      # 5. Purge invalid resource files
      # ══════════════════════════════════════════════
      - name: Purge invalid resource files
        run: |
          ROOT="${{ steps.locate.outputs.project_root }}"

          purge_except() {
            local PAT="$1"; shift; local EXTS=("$@"); local ARGS=()
            for E in "${EXTS[@]}"; do ARGS+=( ! -name "*$E" ); done
            find "$ROOT" -path "$PAT" -type d | while read -r DIR; do
              find "$DIR" -maxdepth 1 -type f "${ARGS[@]}" \
                | while read -r F; do echo "  REMOVING: $F"; rm -f "$F"; done
            done
          }

          purge_except "*/res/font*"       ".xml" ".ttf" ".ttc" ".otf"
          purge_except "*/res/layout*"     ".xml"
          purge_except "*/res/values*"     ".xml"
          purge_except "*/res/anim*"       ".xml"
          purge_except "*/res/animator*"   ".xml"
          purge_except "*/res/color*"      ".xml"
          purge_except "*/res/menu*"       ".xml"
          purge_except "*/res/xml*"        ".xml"
          purge_except "*/res/transition*" ".xml"
          purge_except "*/res/navigation*" ".xml"
          purge_except "*/res/drawable*"   ".xml" ".png" ".jpg" ".jpeg" ".webp" ".gif"
          purge_except "*/res/mipmap*"     ".xml" ".png" ".jpg" ".jpeg" ".webp"

          find "$ROOT" -path "*/res/*" \
            \( -name ".DS_Store" -o -name "Thumbs.db" -o -name "desktop.ini" \
               -o -name "*.bak"  -o -name "*.orig"    -o -name "*.tmp" \) \
            -exec echo "  REMOVING: {}" \; -delete

      # ══════════════════════════════════════════════
      # 6. Download missing fonts from Google Fonts
      # ══════════════════════════════════════════════
      - name: Download missing fonts
        env:
          ROOT: ${{ steps.locate.outputs.project_root }}
        run: |
          python3 << 'PYEOF'
          import os, re, urllib.request, base64

          ROOT = os.environ["ROOT"]
          GF_BASE = "https://github.com/google/fonts/raw/main"

          KNOWN = {
              "cairo_regular":     ("ofl/cairo",       "Cairo-Regular"),
              "cairo_bold":        ("ofl/cairo",       "Cairo-Bold"),
              "cairo_semibold":    ("ofl/cairo",       "Cairo-SemiBold"),
              "cairo_medium":      ("ofl/cairo",       "Cairo-Medium"),
              "cairo_light":       ("ofl/cairo",       "Cairo-Light"),
              "cairo_extrabold":   ("ofl/cairo",       "Cairo-ExtraBold"),
              "cairo_black":       ("ofl/cairo",       "Cairo-Black"),
              "roboto_regular":    ("apache/roboto",   "Roboto-Regular"),
              "roboto_bold":       ("apache/roboto",   "Roboto-Bold"),
              "roboto_medium":     ("apache/roboto",   "Roboto-Medium"),
              "roboto_light":      ("apache/roboto",   "Roboto-Light"),
              "roboto_thin":       ("apache/roboto",   "Roboto-Thin"),
              "roboto_italic":     ("apache/roboto",   "Roboto-Italic"),
              "lato_regular":      ("ofl/lato",        "Lato-Regular"),
              "lato_bold":         ("ofl/lato",        "Lato-Bold"),
              "lato_light":        ("ofl/lato",        "Lato-Light"),
              "lato_italic":       ("ofl/lato",        "Lato-Italic"),
              "poppins_regular":   ("ofl/poppins",     "Poppins-Regular"),
              "poppins_bold":      ("ofl/poppins",     "Poppins-Bold"),
              "poppins_semibold":  ("ofl/poppins",     "Poppins-SemiBold"),
              "poppins_medium":    ("ofl/poppins",     "Poppins-Medium"),
              "poppins_light":     ("ofl/poppins",     "Poppins-Light"),
              "poppins_italic":    ("ofl/poppins",     "Poppins-Italic"),
              "montserrat_regular":("ofl/montserrat",  "Montserrat-Regular"),
              "montserrat_bold":   ("ofl/montserrat",  "Montserrat-Bold"),
              "montserrat_medium": ("ofl/montserrat",  "Montserrat-Medium"),
              "tajawal_regular":   ("ofl/tajawal",     "Tajawal-Regular"),
              "tajawal_bold":      ("ofl/tajawal",     "Tajawal-Bold"),
              "tajawal_medium":    ("ofl/tajawal",     "Tajawal-Medium"),
              "tajawal_light":     ("ofl/tajawal",     "Tajawal-Light"),
              "amiri_regular":     ("ofl/amiri",       "Amiri-Regular"),
              "amiri_bold":        ("ofl/amiri",       "Amiri-Bold"),
              "opensans_regular":  ("apache/opensans", "OpenSans-Regular"),
              "opensans_bold":     ("apache/opensans", "OpenSans-Bold"),
              "open_sans_regular": ("apache/opensans", "OpenSans-Regular"),
              "open_sans_bold":    ("apache/opensans", "OpenSans-Bold"),
          }

          # Minimal valid stub TTF (passes aapt2)
          STUB = bytes.fromhex(
              "0001000000080080000300200063 6d617000000000" \
              .replace(" ","") + "0" * 200
          )

          def fetch(url, dest):
              try:
                  urllib.request.urlretrieve(url, dest)
                  return os.path.getsize(dest) > 1000
              except:
                  return False

          def fix_font(name, font_dir):
              dest = os.path.join(font_dir, name + ".ttf")
              if os.path.exists(dest) and os.path.getsize(dest) > 500:
                  return
              print(f"  Missing: {name}.ttf")

              if name in KNOWN:
                  path, fname = KNOWN[name]
                  if fetch(f"{GF_BASE}/{path}/{fname}.ttf", dest):
                      print(f"  Downloaded: {name}.ttf"); return

              # Generic guess
              parts = name.split("_")
              fam = parts[0]
              var = "".join(p.capitalize() for p in parts[1:]) or "Regular"
              for d in ["ofl","apache","ufl"]:
                  if fetch(f"{GF_BASE}/{d}/{fam}/{fam.capitalize()}-{var}.ttf", dest):
                      print(f"  Downloaded (guess): {name}.ttf"); return

              # Stub fallback
              open(dest,"wb").write(STUB)
              print(f"  Stub created: {name}.ttf")

          for dirpath, _, filenames in os.walk(ROOT):
              if "res" in dirpath and os.path.basename(dirpath).startswith("font"):
                  for f in filenames:
                      if f.endswith(".xml"):
                          content = open(os.path.join(dirpath,f), errors="ignore").read()
                          for ref in set(re.findall(r'@font/(\w+)', content)):
                              fix_font(ref, dirpath)

          print("=== Font check complete ===")
          PYEOF

      # ══════════════════════════════════════════════
      # 7. Fix AndroidX / namespace issues in app/build.gradle
      # ══════════════════════════════════════════════
      - name: Fix common build.gradle issues
        run: |
          ROOT="${{ steps.locate.outputs.project_root }}"
          APP_GRADLE="$ROOT/app/build.gradle"
          APP_GRADLE_KTS="$ROOT/app/build.gradle.kts"

          fix_app_gradle() {
            local FILE="$1"
            [ -f "$FILE" ] || return 0
            echo "  Checking $FILE ..."

            # Add namespace if missing (required in AGP 8+)
            if ! grep -q "namespace" "$FILE"; then
              # Try to extract from AndroidManifest
              MANIFEST=$(find "$ROOT/app" -name "AndroidManifest.xml" | head -n 1)
              PKG=""
              if [ -n "$MANIFEST" ]; then
                PKG=$(grep -o 'package="[^"]*"' "$MANIFEST" | head -n 1 | sed 's/package="//;s/"//')
              fi
              if [ -n "$PKG" ]; then
                echo "  Adding namespace = \"$PKG\" to $FILE"
                python3 - "$FILE" "$PKG" <<'PYEOF'
          import sys, re
          file, pkg = sys.argv[1], sys.argv[2]
          c = open(file).read()
          m = re.search(r'(android\s*\{)', c)
          if m:
              c = c[:m.end()] + f'\n    namespace "{pkg}"\n' + c[m.end():]
              open(file,'w').write(c)
              print(f"  namespace added: {pkg}")
          PYEOF
              fi
            fi

            # Enable dataBinding if used but not declared
            if grep -rq "DataBindingUtil\|ActivityMainBinding\|FragmentMainBinding" "$ROOT/app/src" 2>/dev/null; then
              if ! grep -q "dataBinding\s*{" "$FILE" && ! grep -q "dataBinding.enabled" "$FILE"; then
                echo "  Adding dataBinding { enabled = true }"
                python3 - "$FILE" <<'PYEOF'
          import sys, re
          file = sys.argv[1]
          c = open(file).read()
          m = re.search(r'(android\s*\{)', c)
          if m:
              c = c[:m.end()] + '\n    dataBinding { enabled = true }\n' + c[m.end():]
              open(file,'w').write(c)
              print("  dataBinding enabled")
          PYEOF
              fi
            fi

            # Enable viewBinding if used but not declared
            if grep -rq "ViewBinding\|ActivityMainBinding\|binding\." "$ROOT/app/src" 2>/dev/null; then
              if ! grep -q "viewBinding\s*{" "$FILE" && ! grep -q "viewBinding.enabled" "$FILE"; then
                echo "  Adding viewBinding { enabled = true }"
                python3 - "$FILE" <<'PYEOF'
          import sys, re
          file = sys.argv[1]
          c = open(file).read()
          m = re.search(r'(android\s*\{)', c)
          if m:
              c = c[:m.end()] + '\n    viewBinding { enabled = true }\n' + c[m.end():]
              open(file,'w').write(c)
          PYEOF
              fi
            fi
          }

          fix_app_gradle "$APP_GRADLE"
          fix_app_gradle "$APP_GRADLE_KTS"

      # ══════════════════════════════════════════════
      # 8. Prepare Gradle wrapper
      # ══════════════════════════════════════════════
      - name: Prepare Gradle wrapper
        id: gradle
        run: |
          ROOT="${{ steps.locate.outputs.project_root }}"
          if [ -f "$ROOT/gradlew" ]; then
            chmod +x "$ROOT/gradlew"
            echo "cmd=./gradlew" >> $GITHUB_OUTPUT
          else
            echo "Installing Gradle 8.5 ..."
            cd /tmp
            curl -sL https://services.gradle.org/distributions/gradle-8.5-bin.zip -o gradle.zip
            unzip -q gradle.zip
            echo "/tmp/gradle-8.5/bin" >> $GITHUB_PATH
            echo "cmd=gradle" >> $GITHUB_OUTPUT
          fi

      # ══════════════════════════════════════════════
      # 9. Accept Android SDK licenses
      # ══════════════════════════════════════════════
      - name: Accept Android SDK licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      # ══════════════════════════════════════════════
      # 10. Build — capture FULL log as artifact
      # ══════════════════════════════════════════════
      - name: Build debug APK
        id: build
        working-directory: ${{ steps.locate.outputs.project_root }}
        env:
          GRADLE_OPTS: >-
            -Dorg.gradle.jvmargs=-Xmx2g
            -XX:MaxMetaspaceSize=512m
            -Dfile.encoding=UTF-8
        run: |
          CMD="${{ steps.gradle.outputs.cmd }}"
          LOG="$GITHUB_WORKSPACE/build_full.log"
          set +e
          $CMD assembleDebug \
            --stacktrace \
            --no-daemon \
            --warning-mode all \
            --info \
            2>&1 | tee "$LOG"
          EXIT_CODE=${PIPESTATUS[0]}
          set -e

          if [ $EXIT_CODE -ne 0 ]; then
            echo ""
            echo "══════════════════════════════════════════"
            echo "  BUILD FAILED — KEY ERRORS:"
            echo "══════════════════════════════════════════"
            grep -E "^(error:|FAILED|Caused by:|> )" "$LOG" | head -40 || true
            echo "══════════════════════════════════════════"
            echo "  Full log saved → build_full.log artifact"
            echo "══════════════════════════════════════════"
            exit $EXIT_CODE
          fi

      # ══════════════════════════════════════════════
      # 11. Upload full build log (always — even on failure)
      # ══════════════════════════════════════════════
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: build_full.log
          retention-days: 7

      # ══════════════════════════════════════════════
      # 12. Collect & upload APK
      # ══════════════════════════════════════════════
      - name: Collect APK files
        run: |
          ROOT="${{ steps.locate.outputs.project_root }}"
          APKS=$(find "$ROOT" -name "*.apk" -type f)
          if [ -z "$APKS" ]; then echo "ERROR: No APK produced."; exit 1; fi
          TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
          mkdir -p "$GITHUB_WORKSPACE/output"
          echo "$APKS" | while read -r APK; do
            BASE=$(basename "$APK" .apk)
            cp "$APK" "$GITHUB_WORKSPACE/output/${BASE}_${TIMESTAMP}.apk"
            echo "  APK: ${BASE}_${TIMESTAMP}.apk"
          done

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK-${{ github.run_number }}
          path: output/*.apk
          retention-days: 30

      - name: Summary
        run: |
          echo "BUILD SUCCESSFUL"
          echo "APK → Actions tab → this run → Artifacts → Android-APK-${{ github.run_number }}"
