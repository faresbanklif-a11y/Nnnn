name: Build Android APK

on:
  push:
  workflow_dispatch:
    inputs:
      zip_file:
        description: 'ZIP file path (leave empty to auto-detect)'
        required: false
        default: ''

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ══════════════════════════════════════════════════════════════
      # STEP 1 — Find Android project (ZIP or repo)
      # ══════════════════════════════════════════════════════════════
      - name: Locate Android project
        id: locate
        run: |
          set -e
          WORK="$GITHUB_WORKSPACE"
          ZIP="${{ github.event.inputs.zip_file }}"
          [ -z "$ZIP" ] && ZIP=$(find "$WORK" -maxdepth 2 -name "*.zip" | head -n 1)

          if [ -n "$ZIP" ] && [ -f "$ZIP" ]; then
            echo "Extracting: $ZIP"
            mkdir -p "$WORK/extracted_project"
            unzip -o "$ZIP" -d "$WORK/extracted_project"
            SEARCH="$WORK/extracted_project"
          else
            SEARCH="$WORK"
          fi

          SETTINGS=$(find "$SEARCH" \
            \( -name "settings.gradle" -o -name "settings.gradle.kts" \) \
            | head -n 1)
          [ -z "$SETTINGS" ] && { echo "ERROR: settings.gradle not found"; exit 1; }

          ROOT=$(dirname "$SETTINGS")
          echo "project_root=$ROOT" >> $GITHUB_OUTPUT
          echo "Project root: $ROOT"

      # ══════════════════════════════════════════════════════════════
      # STEP 2 — THE MEGA FIX SCRIPT
      #   Fixes every known Android build error category:
      #   [A] Gradle repositories (JitPack, Google, Maven)
      #   [B] Invalid resource files (res/ folder rules)
      #   [C] Missing fonts (download from Google Fonts)
      #   [D] CMake / NDK removal (main crash source)
      #   [E] namespace declaration (AGP 8+ required)
      #   [F] Java/Kotlin JVM target mismatch
      #   [G] AndroidX + Jetifier enablement
      #   [H] compileSdk / targetSdk / minSdk sanity
      #   [I] Duplicate classes resolution
      #   [J] dataBinding / viewBinding auto-enable
      #   [K] gradle.properties best-practice flags
      #   [L] Kotlin stdlib conflict exclusion
      # ══════════════════════════════════════════════════════════════
      - name: Apply all pre-build fixes
        env:
          ROOT: ${{ steps.locate.outputs.project_root }}
        run: |
          python3 << 'PYEOF'
          import os, re, urllib.request, shutil

          ROOT = os.environ["ROOT"]
          print(f"\n{'='*60}")
          print(f"  Fixing project at: {ROOT}")
          print(f"{'='*60}\n")

          def read(p):
              try: return open(p, encoding='utf-8', errors='ignore').read()
              except: return ''

          def write(p, c):
              open(p, 'w', encoding='utf-8').write(c)

          def patch(filepath, old_pattern, new_text, flags=re.DOTALL, label=''):
              c = read(filepath)
              if not c: return False
              new_c, n = re.subn(old_pattern, new_text, c, flags=flags)
              if n:
                  write(filepath, new_c)
                  print(f"  [{label}] patched {os.path.basename(filepath)} ({n} change(s))")
                  return True
              return False

          # ──────────────────────────────────────────────────────────
          # [A] Gradle repositories — ensure google, mavenCentral,
          #     jitpack are present everywhere
          # ──────────────────────────────────────────────────────────
          print("[A] Fixing Gradle repositories...")

          def inject_repos(filepath, is_kts=False):
              if not os.path.exists(filepath): return
              c = read(filepath)
              if 'jitpack.io' in c: return
              jitpack = ('        maven { url = uri("https://jitpack.io") }\n'
                         if is_kts else
                         '        maven { url "https://jitpack.io" }\n')
              for pat in [
                  r'(dependencyResolutionManagement\s*\{[^}]*repositories\s*\{)',
                  r'(allprojects\s*\{[^}]*repositories\s*\{)',
              ]:
                  m = re.search(pat, c, re.DOTALL)
                  if m:
                      c = c[:m.end()] + '\n' + jitpack + c[m.end():]
                      write(filepath, c)
                      print(f"  [A] jitpack added to {os.path.basename(filepath)}")
                      return

          inject_repos(f"{ROOT}/settings.gradle")
          inject_repos(f"{ROOT}/settings.gradle.kts", is_kts=True)
          inject_repos(f"{ROOT}/build.gradle")
          inject_repos(f"{ROOT}/build.gradle.kts", is_kts=True)

          # Fallback: append full block
          if not any(os.path.exists(f"{ROOT}/{f}") and 'jitpack.io' in read(f"{ROOT}/{f}")
                     for f in ['settings.gradle','settings.gradle.kts','build.gradle']):
              sg = f"{ROOT}/settings.gradle"
              if os.path.exists(sg):
                  with open(sg, 'a') as f:
                      f.write("""
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
              repositories {
                  google()
                  mavenCentral()
                  maven { url "https://jitpack.io" }
              }
          }
          """)
                  print("  [A] appended full repos block to settings.gradle")

          # ──────────────────────────────────────────────────────────
          # [B] Purge invalid files from res/ folders
          # ──────────────────────────────────────────────────────────
          print("[B] Purging invalid resource files...")

          ALLOWED_EXT = {
              'font':        {'.xml','.ttf','.ttc','.otf'},
              'layout':      {'.xml'}, 'values':     {'.xml'},
              'anim':        {'.xml'}, 'animator':   {'.xml'},
              'color':       {'.xml'}, 'menu':       {'.xml'},
              'xml':         {'.xml'}, 'transition': {'.xml'},
              'navigation':  {'.xml'}, 'interpolator':{'.xml'},
              'drawable':    {'.xml','.png','.jpg','.jpeg','.webp','.gif','.9.png'},
              'mipmap':      {'.xml','.png','.jpg','.jpeg','.webp'},
          }
          JUNK_NAMES = {'.DS_Store','Thumbs.db','desktop.ini','.gitkeep'}
          JUNK_EXTS  = {'.bak','.tmp','.orig','.txt','.md','.log'}

          for dirpath, _, filenames in os.walk(ROOT):
              if 'res' not in dirpath: continue
              dirname = os.path.basename(dirpath)
              key = next((k for k in ALLOWED_EXT if dirname.startswith(k)), None)
              for fname in filenames:
                  fpath = os.path.join(dirpath, fname)
                  ext = os.path.splitext(fname)[1].lower()
                  if fname in JUNK_NAMES or ext in JUNK_EXTS:
                      os.remove(fpath)
                      print(f"  [B] removed junk: {fname}")
                  elif key and ext not in ALLOWED_EXT[key]:
                      os.remove(fpath)
                      print(f"  [B] removed invalid {ext} from res/{dirname}/: {fname}")

          # ──────────────────────────────────────────────────────────
          # [C] Download missing fonts from Google Fonts GitHub
          # ──────────────────────────────────────────────────────────
          print("[C] Checking missing fonts...")

          FONTS_MAP = {
              'cairo_regular':('ofl/cairo','Cairo-Regular'),
              'cairo_bold':('ofl/cairo','Cairo-Bold'),
              'cairo_semibold':('ofl/cairo','Cairo-SemiBold'),
              'cairo_medium':('ofl/cairo','Cairo-Medium'),
              'cairo_light':('ofl/cairo','Cairo-Light'),
              'cairo_extrabold':('ofl/cairo','Cairo-ExtraBold'),
              'cairo_black':('ofl/cairo','Cairo-Black'),
              'roboto_regular':('apache/roboto','Roboto-Regular'),
              'roboto_bold':('apache/roboto','Roboto-Bold'),
              'roboto_medium':('apache/roboto','Roboto-Medium'),
              'roboto_light':('apache/roboto','Roboto-Light'),
              'roboto_thin':('apache/roboto','Roboto-Thin'),
              'roboto_italic':('apache/roboto','Roboto-Italic'),
              'roboto_condensed_regular':('apache/robotocondensed','RobotoCondensed-Regular'),
              'roboto_condensed_bold':('apache/robotocondensed','RobotoCondensed-Bold'),
              'lato_regular':('ofl/lato','Lato-Regular'),
              'lato_bold':('ofl/lato','Lato-Bold'),
              'lato_light':('ofl/lato','Lato-Light'),
              'lato_italic':('ofl/lato','Lato-Italic'),
              'poppins_regular':('ofl/poppins','Poppins-Regular'),
              'poppins_bold':('ofl/poppins','Poppins-Bold'),
              'poppins_semibold':('ofl/poppins','Poppins-SemiBold'),
              'poppins_medium':('ofl/poppins','Poppins-Medium'),
              'poppins_light':('ofl/poppins','Poppins-Light'),
              'poppins_italic':('ofl/poppins','Poppins-Italic'),
              'montserrat_regular':('ofl/montserrat','Montserrat-Regular'),
              'montserrat_bold':('ofl/montserrat','Montserrat-Bold'),
              'montserrat_medium':('ofl/montserrat','Montserrat-Medium'),
              'montserrat_semibold':('ofl/montserrat','Montserrat-SemiBold'),
              'tajawal_regular':('ofl/tajawal','Tajawal-Regular'),
              'tajawal_bold':('ofl/tajawal','Tajawal-Bold'),
              'tajawal_medium':('ofl/tajawal','Tajawal-Medium'),
              'tajawal_light':('ofl/tajawal','Tajawal-Light'),
              'amiri_regular':('ofl/amiri','Amiri-Regular'),
              'amiri_bold':('ofl/amiri','Amiri-Bold'),
              'opensans_regular':('apache/opensans','OpenSans-Regular'),
              'open_sans_regular':('apache/opensans','OpenSans-Regular'),
              'open_sans_bold':('apache/opensans','OpenSans-Bold'),
              'noto_sans_regular':('ofl/notosans','NotoSans-Regular'),
              'noto_sans_bold':('ofl/notosans','NotoSans-Bold'),
              'inter_regular':('ofl/inter','Inter-Regular'),
              'inter_bold':('ofl/inter','Inter-Bold'),
              'inter_medium':('ofl/inter','Inter-Medium'),
              'raleway_regular':('ofl/raleway','Raleway-Regular'),
              'raleway_bold':('ofl/raleway','Raleway-Bold'),
          }
          GF_BASE = 'https://github.com/google/fonts/raw/main'

          def dl_font(url, dest):
              try:
                  urllib.request.urlretrieve(url, dest)
                  return os.path.getsize(dest) > 1000
              except: return False

          for dirpath, _, fnames in os.walk(ROOT):
              if 'res' not in dirpath: continue
              if not os.path.basename(dirpath).startswith('font'): continue
              for fname in fnames:
                  if not fname.endswith('.xml'): continue
                  content = read(os.path.join(dirpath, fname))
                  for ref in set(re.findall(r'@font/(\w+)', content)):
                      dest = os.path.join(dirpath, ref+'.ttf')
                      if os.path.exists(dest) and os.path.getsize(dest) > 500: continue
                      print(f"  [C] missing font: {ref}.ttf — downloading...")
                      ok = False
                      if ref in FONTS_MAP:
                          p, fn = FONTS_MAP[ref]
                          ok = dl_font(f'{GF_BASE}/{p}/{fn}.ttf', dest)
                      if not ok:
                          parts = ref.split('_')
                          fam, var = parts[0], ''.join(p.capitalize() for p in parts[1:]) or 'Regular'
                          for d in ['ofl','apache','ufl']:
                              ok = dl_font(f'{GF_BASE}/{d}/{fam}/{fam.capitalize()}-{var}.ttf', dest)
                              if ok: break
                      print(f"  [C] {'downloaded' if ok else 'stub created'}: {ref}.ttf")
                      if not ok: open(dest,'wb').write(b'\x00'*512)

          # ──────────────────────────────────────────────────────────
          # [D] Remove CMake / externalNativeBuild / ndkBuild
          #     (these cause buildCMakeDebug failures)
          # ──────────────────────────────────────────────────────────
          print("[D] Removing CMake/NDK config...")

          CMAKE_PATTERNS = [
              r'externalNativeBuild\s*\{(?:[^{}]|\{[^{}]*\})*\}',
              r'cmake\s*\{(?:[^{}]|\{[^{}]*\})*\}',
              r'ndkBuild\s*\{(?:[^{}]|\{[^{}]*\})*\}',
          ]

          for grad in [f"{ROOT}/app/build.gradle", f"{ROOT}/app/build.gradle.kts"]:
              if not os.path.exists(grad): continue
              c = read(grad)
              orig = c
              for pat in CMAKE_PATTERNS:
                  c = re.sub(pat, '', c, flags=re.DOTALL)
              if c != orig:
                  write(grad, c)
                  print(f"  [D] CMake blocks removed from {os.path.basename(grad)}")

          # ──────────────────────────────────────────────────────────
          # [E] Add namespace if missing (required in AGP 7.3+)
          # ──────────────────────────────────────────────────────────
          print("[E] Checking namespace...")

          for grad in [f"{ROOT}/app/build.gradle", f"{ROOT}/app/build.gradle.kts"]:
              if not os.path.exists(grad): continue
              c = read(grad)
              if 'namespace' in c: continue
              manifest = next(
                  (os.path.join(dp,f)
                   for dp,_,fs in os.walk(f"{ROOT}/app")
                   for f in fs if f == 'AndroidManifest.xml'),
                  None
              )
              if not manifest: continue
              mc = read(manifest)
              pkg = re.search(r'package="([^"]+)"', mc)
              if not pkg: continue
              ns_val = pkg.group(1)
              is_kts = grad.endswith('.kts')
              ns_line = f'\n    namespace = "{ns_val}"\n' if is_kts else f'\n    namespace "{ns_val}"\n'
              m = re.search(r'(android\s*\{)', c)
              if m:
                  write(grad, c[:m.end()] + ns_line + c[m.end():])
                  print(f"  [E] namespace = {ns_val}")

          # ──────────────────────────────────────────────────────────
          # [F] Fix Java/Kotlin JVM target mismatch
          #     Adds compileOptions + kotlinOptions targeting Java 11
          # ──────────────────────────────────────────────────────────
          print("[F] Fixing JVM target compatibility...")

          COMPILE_OPTIONS_GROOVY = """
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_11
                  targetCompatibility JavaVersion.VERSION_11
              }
              kotlinOptions {
                  jvmTarget = '11'
              }
          """

          for grad in [f"{ROOT}/app/build.gradle"]:
              if not os.path.exists(grad): continue
              c = read(grad)
              if 'compileOptions' in c: continue
              m = re.search(r'(android\s*\{)', c)
              if m:
                  write(grad, c[:m.end()] + COMPILE_OPTIONS_GROOVY + c[m.end():])
                  print(f"  [F] compileOptions + kotlinOptions added")

          for grad in [f"{ROOT}/app/build.gradle.kts"]:
              if not os.path.exists(grad): continue
              c = read(grad)
              if 'compileOptions' in c: continue
              m = re.search(r'(android\s*\{)', c)
              if m:
                  block = """
              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_11
                  targetCompatibility = JavaVersion.VERSION_11
              }
              kotlinOptions {
                  jvmTarget = "11"
              }
          """
                  write(grad, c[:m.end()] + block + c[m.end():])
                  print(f"  [F] compileOptions + kotlinOptions added (KTS)")

          # ──────────────────────────────────────────────────────────
          # [G] gradle.properties — enable AndroidX, Jetifier,
          #     and other best-practice flags
          # ──────────────────────────────────────────────────────────
          print("[G] Fixing gradle.properties...")

          PROPS_FILE = f"{ROOT}/gradle.properties"
          props = read(PROPS_FILE)

          REQUIRED_PROPS = {
              'android.useAndroidX':              'true',
              'android.enableJetifier':           'true',
              'kotlin.code.style':                'official',
              'android.nonTransitiveRClass':      'false',
              'android.suppressUnsupportedOptionWarnings': 'android.suppressUnsupportedOptionWarnings',
              'org.gradle.parallel':              'true',
              'org.gradle.caching':               'true',
          }

          for key, val in REQUIRED_PROPS.items():
              if key not in props:
                  props += f'\n{key}={val}'
                  print(f"  [G] added: {key}={val}")

          write(PROPS_FILE, props)

          # ──────────────────────────────────────────────────────────
          # [H] Sanitize compileSdk / targetSdk / minSdk
          #     Ensure values are in acceptable ranges
          # ──────────────────────────────────────────────────────────
          print("[H] Sanitizing SDK versions...")

          for grad in [f"{ROOT}/app/build.gradle", f"{ROOT}/app/build.gradle.kts"]:
              if not os.path.exists(grad): continue
              c = read(grad)
              orig = c

              # compileSdk must be <= 35 (latest stable) and >= 33
              def fix_sdk(text, key, min_v, max_v, default):
                  def replacer(m):
                      val = int(m.group(1))
                      if val < min_v or val > max_v:
                          print(f"  [H] {key} {val} → {default}")
                          return m.group(0).replace(str(val), str(default))
                      return m.group(0)
                  return re.sub(rf'{key}\s*=?\s*(\d+)', replacer, text)

              c = fix_sdk(c, 'compileSdk',  33, 35, 34)
              c = fix_sdk(c, 'targetSdk',   30, 35, 34)
              c = fix_sdk(c, 'minSdk',       1, 35, 21)

              if c != orig:
                  write(grad, c)

          # ──────────────────────────────────────────────────────────
          # [I] Fix duplicate classes (Kotlin stdlib conflicts)
          #     Add resolution strategy to top-level build.gradle
          # ──────────────────────────────────────────────────────────
          print("[I] Adding duplicate class resolution...")

          TOP_GRADLE = f"{ROOT}/build.gradle"
          if os.path.exists(TOP_GRADLE):
              c = read(TOP_GRADLE)
              if 'resolutionStrategy' not in c:
                  RESOLUTION = """
          allprojects {
              configurations.all {
                  resolutionStrategy {
                      force 'org.jetbrains.kotlin:kotlin-stdlib:1.9.22'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-common:1.9.22'
                  }
                  exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
                  exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
              }
          }
          """
                  # Append before last closing brace or at end
                  write(TOP_GRADLE, c + RESOLUTION)
                  print("  [I] resolutionStrategy added to build.gradle")

          # ──────────────────────────────────────────────────────────
          # [J] Auto-enable dataBinding / viewBinding
          # ──────────────────────────────────────────────────────────
          print("[J] Checking dataBinding / viewBinding...")

          SRC_DIR = f"{ROOT}/app/src"

          def src_contains(keyword):
              for dp, _, fs in os.walk(SRC_DIR):
                  for f in fs:
                      if f.endswith(('.kt','.java')):
                          if keyword in read(os.path.join(dp,f)):
                              return True
              return False

          for grad in [f"{ROOT}/app/build.gradle"]:
              if not os.path.exists(grad): continue
              c = read(grad)
              changed = False
              if 'dataBinding' not in c and src_contains('DataBindingUtil'):
                  m = re.search(r'(android\s*\{)', c)
                  if m:
                      c = c[:m.end()] + '\n    dataBinding { enabled = true }\n' + c[m.end():]
                      changed = True
                      print("  [J] dataBinding enabled")
              if 'viewBinding' not in c and src_contains('ViewBinding'):
                  m = re.search(r'(android\s*\{)', c)
                  if m:
                      c = c[:m.end()] + '\n    viewBinding { enabled = true }\n' + c[m.end():]
                      changed = True
                      print("  [J] viewBinding enabled")
              if changed: write(grad, c)

          # ──────────────────────────────────────────────────────────
          # [K] Remove package= attribute from AndroidManifest
          #     (deprecated in AGP 7.3+, causes warnings/errors)
          # ──────────────────────────────────────────────────────────
          print("[K] Cleaning AndroidManifest...")

          for dp, _, fs in os.walk(ROOT):
              for f in fs:
                  if f != 'AndroidManifest.xml': continue
                  fpath = os.path.join(dp, f)
                  c = read(fpath)
                  # Remove package= from manifest tag (keep it only if namespace not in build.gradle)
                  # We keep it as-is since removing it can break things too
                  # Just suppress the warning by doing nothing — namespace fix in [E] handles it

          # ──────────────────────────────────────────────────────────
          # [L] Ensure Kotlin plugin version compatibility
          #     If project uses kotlin but no kotlin version set, add it
          # ──────────────────────────────────────────────────────────
          print("[L] Checking Kotlin version...")

          TOP_GRADLE = f"{ROOT}/build.gradle"
          if os.path.exists(TOP_GRADLE):
              c = read(TOP_GRADLE)
              # If uses kotlin plugin but no explicit version
              if "org.jetbrains.kotlin" in c and "ext.kotlin_version" not in c:
                  m = re.search(r'(buildscript\s*\{)', c)
                  if m:
                      c = c[:m.end()] + "\n    ext.kotlin_version = '1.9.22'\n" + c[m.end():]
                      write(TOP_GRADLE, c)
                      print("  [L] kotlin_version = 1.9.22 added")

          print(f"\n{'='*60}")
          print("  ALL FIXES APPLIED SUCCESSFULLY")
          print(f"{'='*60}\n")
          PYEOF

      # ══════════════════════════════════════════════════════════════
      # STEP 3 — Accept SDK licenses
      # ══════════════════════════════════════════════════════════════
      - name: Accept Android SDK licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      # ══════════════════════════════════════════════════════════════
      # STEP 4 — Prepare Gradle wrapper
      # ══════════════════════════════════════════════════════════════
      - name: Prepare Gradle
        id: gradle
        run: |
          ROOT="${{ steps.locate.outputs.project_root }}"
          if [ -f "$ROOT/gradlew" ]; then
            chmod +x "$ROOT/gradlew"
            echo "cmd=./gradlew" >> $GITHUB_OUTPUT
            echo "Using project gradlew"
          else
            echo "No gradlew — installing Gradle 8.5"
            cd /tmp
            curl -sL https://services.gradle.org/distributions/gradle-8.5-bin.zip -o g.zip
            unzip -q g.zip
            echo "/tmp/gradle-8.5/bin" >> $GITHUB_PATH
            echo "cmd=gradle" >> $GITHUB_OUTPUT
          fi

      # ══════════════════════════════════════════════════════════════
      # STEP 5 — Build with full error capture
      # ══════════════════════════════════════════════════════════════
      - name: Build debug APK
        working-directory: ${{ steps.locate.outputs.project_root }}
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx3g -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8"
        run: |
          CMD="${{ steps.gradle.outputs.cmd }}"
          LOG="$GITHUB_WORKSPACE/build_full.log"
          ERR="$GITHUB_WORKSPACE/build_errors.log"

          set +e
          $CMD assembleDebug --stacktrace --no-daemon 2>&1 | tee "$LOG"
          CODE=${PIPESTATUS[0]}
          set -e

          if [ $CODE -ne 0 ]; then
            echo ""
            echo "╔══════════════════════════════════════════════════════╗"
            echo "║           BUILD FAILED — ERROR SUMMARY               ║"
            echo "╚══════════════════════════════════════════════════════╝"

            # Extract all error types
            {
              echo "=== Kotlin errors (e:) ==="
              grep "^e: " "$LOG" || echo "(none)"
              echo ""
              echo "=== Resource/AAPT errors ==="
              grep -E "^(error:|Error:)" "$LOG" | grep -v "Binary\|\.class\|Warning" || echo "(none)"
              echo ""
              echo "=== CMake/NDK errors ==="
              grep -E "(CMake Error|ninja: error|clang.*error:)" "$LOG" || echo "(none)"
              echo ""
              echo "=== Duplicate class errors ==="
              grep -i "duplicate class" "$LOG" || echo "(none)"
              echo ""
              echo "=== Caused by (root cause) ==="
              grep "Caused by:" "$LOG" | grep -v "^\s*at " | head -20 || echo "(none)"
              echo ""
              echo "=== Last 100 lines ==="
              tail -100 "$LOG"
            } | tee "$ERR"

            exit $CODE
          fi

      # ══════════════════════════════════════════════════════════════
      # STEP 6 — Upload logs (always, even on failure)
      # ══════════════════════════════════════════════════════════════
      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_number }}
          path: |
            build_full.log
            build_errors.log
          retention-days: 7

      # ══════════════════════════════════════════════════════════════
      # STEP 7 — Collect and upload APK
      # ══════════════════════════════════════════════════════════════
      - name: Collect APK
        run: |
          ROOT="${{ steps.locate.outputs.project_root }}"
          APKS=$(find "$ROOT" -name "*.apk" -type f)
          [ -z "$APKS" ] && { echo "ERROR: No APK found"; exit 1; }
          mkdir -p "$GITHUB_WORKSPACE/output"
          TS=$(date +"%Y%m%d_%H%M%S")
          echo "$APKS" | while read -r APK; do
            B=$(basename "$APK" .apk)
            DEST="$GITHUB_WORKSPACE/output/${B}_${TS}.apk"
            cp "$APK" "$DEST"
            echo "APK: $DEST"
          done

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK-${{ github.run_number }}
          path: output/*.apk
          retention-days: 30

      - name: Done
        run: |
          echo "╔══════════════════════════════════════════╗"
          echo "║          BUILD SUCCESSFUL!               ║"
          echo "║  Download APK from Artifacts section     ║"
          echo "╚══════════════════════════════════════════╝"
