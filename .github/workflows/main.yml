name: Build Android APK

on:
  push:
  workflow_dispatch:
    inputs:
      zip_file:
        description: 'Path to ZIP file (leave empty to auto-detect or build repo directly)'
        required: false
        default: ''

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # ──────────────────────────────────────────────
      # 1. Checkout
      # ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ──────────────────────────────────────────────
      # 2. Java 17
      # ──────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ──────────────────────────────────────────────
      # 3. Locate the Android project
      #    Priority:
      #      A) Explicit ZIP input
      #      B) Any *.zip in the repo root
      #      C) The repo itself (project already extracted)
      # ──────────────────────────────────────────────
      - name: Locate Android project
        id: locate
        run: |
          set -e

          ZIP_INPUT="${{ github.event.inputs.zip_file }}"
          WORK_DIR="$GITHUB_WORKSPACE"
          EXTRACTED=false

          # --- Try ZIP ---
          if [ -n "$ZIP_INPUT" ] && [ -f "$ZIP_INPUT" ]; then
            ZIP="$ZIP_INPUT"
          else
            ZIP=$(find "$WORK_DIR" -maxdepth 2 -name "*.zip" | head -n 1)
          fi

          if [ -n "$ZIP" ]; then
            echo "Found ZIP: $ZIP"
            mkdir -p "$WORK_DIR/extracted_project"
            unzip -o "$ZIP" -d "$WORK_DIR/extracted_project"
            EXTRACTED=true
            SEARCH_ROOT="$WORK_DIR/extracted_project"
          else
            echo "No ZIP found — treating repository as the Android project."
            SEARCH_ROOT="$WORK_DIR"
          fi

          # --- Find settings.gradle ---
          SETTINGS=$(find "$SEARCH_ROOT" \
            \( -name "settings.gradle" -o -name "settings.gradle.kts" \) \
            | head -n 1)

          if [ -z "$SETTINGS" ]; then
            echo "ERROR: Cannot locate settings.gradle in the project."
            echo "Files found:"
            find "$SEARCH_ROOT" -type f | head -60
            exit 1
          fi

          PROJECT_ROOT=$(dirname "$SETTINGS")
          echo "Android project root: $PROJECT_ROOT"

          echo "project_root=$PROJECT_ROOT" >> $GITHUB_OUTPUT
          echo "extracted=$EXTRACTED"       >> $GITHUB_OUTPUT

      # ──────────────────────────────────────────────
      # 4. Purge ALL invalid files from res/ BEFORE Gradle sees them.
      #
      #    Android resource rules:
      #      res/font/     → only .xml .ttf .ttc .otf
      #      res/layout/   → only .xml
      #      res/values*/  → only .xml
      #      res/drawable/ → only .xml .png .jpg .jpeg .webp .gif
      #      res/mipmap/   → only .xml .png .jpg .jpeg .webp
      #      res/anim/     → only .xml
      #      res/animator/ → only .xml
      #      res/color/    → only .xml
      #      res/menu/     → only .xml
      #      res/xml/      → only .xml
      #      res/raw/      → any file (skip)
      #      res/transition/→ only .xml
      #
      #    Everything else (.txt, .md, .DS_Store, Thumbs.db, etc.) → DELETE
      # ──────────────────────────────────────────────
      - name: Purge invalid resource files
        run: |
          set -e
          ROOT="${{ steps.locate.outputs.project_root }}"
          echo "=== Purging invalid resource files under: $ROOT ==="

          purge_except() {
            local DIR_PATTERN="$1"   # e.g. "*/res/font"
            shift
            local EXTS=("$@")        # e.g. ".xml" ".ttf" ".ttc" ".otf"

            # Build the find exclusion arguments
            EXCLUDE_ARGS=()
            for EXT in "${EXTS[@]}"; do
              EXCLUDE_ARGS+=( ! -name "*$EXT" )
            done

            find "$ROOT" -path "$DIR_PATTERN" -type d | while read -r DIR; do
              find "$DIR" -maxdepth 1 -type f "${EXCLUDE_ARGS[@]}" \
                | while read -r BAD_FILE; do
                    echo "  REMOVING: $BAD_FILE"
                    rm -f "$BAD_FILE"
                  done
            done
          }

          # font — strict
          purge_except "*/res/font*"     ".xml" ".ttf" ".ttc" ".otf"

          # layout, values, anim, animator, color, menu, xml, transition, interpolator
          for D in layout "values*" anim animator color menu "xml" transition interpolator; do
            purge_except "*/res/${D}" ".xml"
          done

          # drawable, mipmap
          purge_except "*/res/drawable*" ".xml" ".png" ".jpg" ".jpeg" ".webp" ".gif"
          purge_except "*/res/mipmap*"   ".xml" ".png" ".jpg" ".jpeg" ".webp"

          # Navigation, raw, assets — skip (they allow arbitrary content)

          # Junk files anywhere in res/
          echo "  Removing OS junk files from res/ ..."
          find "$ROOT" -path "*/res/*" \
            \( -name ".DS_Store" -o -name "Thumbs.db" -o -name "desktop.ini" \
               -o -name "*.bak"  -o -name "*.orig"    -o -name "*.tmp" \) \
            -exec echo "  REMOVING: {}" \; -delete

          echo "=== Purge complete ==="

      # ──────────────────────────────────────────────
      # 5. Ensure gradlew is executable
      # ──────────────────────────────────────────────
      - name: Prepare Gradle wrapper
        id: gradle
        run: |
          ROOT="${{ steps.locate.outputs.project_root }}"
          if [ -f "$ROOT/gradlew" ]; then
            chmod +x "$ROOT/gradlew"
            echo "cmd=./gradlew" >> $GITHUB_OUTPUT
            echo "gradlew found."
          else
            echo "WARNING: gradlew not found — falling back to system Gradle 8.5"
            # Install a known-good Gradle version
            cd /tmp
            curl -sL https://services.gradle.org/distributions/gradle-8.5-bin.zip -o gradle.zip
            unzip -q gradle.zip
            export PATH="/tmp/gradle-8.5/bin:$PATH"
            echo "/tmp/gradle-8.5/bin" >> $GITHUB_PATH
            echo "cmd=gradle" >> $GITHUB_OUTPUT
          fi

      # ──────────────────────────────────────────────
      # 6. Accept Android SDK licenses (prevents hangs)
      # ──────────────────────────────────────────────
      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses \
            || true   # non-zero exit is fine; licenses may already be accepted

      # ──────────────────────────────────────────────
      # 7. Build Debug APK
      # ──────────────────────────────────────────────
      - name: Build debug APK
        working-directory: ${{ steps.locate.outputs.project_root }}
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8"
        run: |
          CMD="${{ steps.gradle.outputs.cmd }}"
          echo "Running: $CMD assembleDebug"
          $CMD assembleDebug \
            --stacktrace \
            --no-daemon \
            --warning-mode all

      # ──────────────────────────────────────────────
      # 8. Collect APK(s)
      # ──────────────────────────────────────────────
      - name: Collect APK files
        id: collect
        run: |
          ROOT="${{ steps.locate.outputs.project_root }}"
          APKS=$(find "$ROOT" -name "*.apk" -type f)

          if [ -z "$APKS" ]; then
            echo "ERROR: No APK produced."
            exit 1
          fi

          echo "Built APKs:"
          echo "$APKS"

          TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
          mkdir -p "$GITHUB_WORKSPACE/output"

          echo "$APKS" | while read -r APK; do
            BASE=$(basename "$APK" .apk)
            DEST="$GITHUB_WORKSPACE/output/${BASE}_${TIMESTAMP}.apk"
            cp "$APK" "$DEST"
            echo "  -> $DEST"
          done

      # ──────────────────────────────────────────────
      # 9. Upload as GitHub Artifact (downloadable)
      # ──────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK-${{ github.run_number }}
          path: output/*.apk
          retention-days: 30

      - name: Summary
        run: |
          echo "✅ BUILD SUCCESSFUL"
          echo "Download your APK:"
          echo "  GitHub → Actions tab → this run → Artifacts section"
