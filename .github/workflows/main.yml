name: Build APK From ZIP

on:
  workflow_dispatch:
  push:
    branches: [ "main", "رئيسي" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unzip and Setup Project
        run: |
          # 1. فك الضغط
          ZIP_FILE=$(ls *.zip | head -n 1)
          unzip "$ZIP_FILE" -d temp_folder
          
          # 2. البحث عن مكان المشروع الحقيقي
          PROJECT_ROOT=$(find temp_folder -name "build.gradle" | head -n 1 | xargs dirname)
          
          # 3. نقل الملفات للمسار الرئيسي
          cp -r "$PROJECT_ROOT"/. .
          
          # 4. محاولة إصلاح الصلاحيات لو كان الملف موجود
          chmod +x gradlew || true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK (The Badass Way)
        run: |
          # إذا كان الملف المفقود غير موجود، سنستخدم محرك النظام مباشرة
          if [ -f "./gradlew" ]; then
            ./gradlew assembleDebug
          else
            echo "المفتاح gradlew مفقود، جاري استخدام المحرك البديل..."
            # تنصيب محرك البناء يدوياً لو لزم الأمر
            sudo apt-get install -y gradle
            gradle assembleDebug
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: My-Finished-App
          path: "**/build/outputs/apk/debug/*.apk"
