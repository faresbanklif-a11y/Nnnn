name: Build Android APK

on:
  push:
  workflow_dispatch:
    inputs:
      zip_file:
        description: 'ZIP file path (leave empty to auto-detect)'
        required: false
        default: ''

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ─────────────────────────────────────────────
      # STEP 1 — Find the Android project
      # ─────────────────────────────────────────────
      - name: Locate Android project
        id: locate
        run: |
          set -e
          WORK="$GITHUB_WORKSPACE"
          ZIP="${{ github.event.inputs.zip_file }}"
          [ -z "$ZIP" ] && ZIP=$(find "$WORK" -maxdepth 2 -name "*.zip" | head -n 1)

          if [ -n "$ZIP" ] && [ -f "$ZIP" ]; then
            echo "Extracting: $ZIP"
            mkdir -p "$WORK/extracted_project"
            unzip -o "$ZIP" -d "$WORK/extracted_project"
            SEARCH="$WORK/extracted_project"
          else
            SEARCH="$WORK"
          fi

          SETTINGS=$(find "$SEARCH" \
            \( -name "settings.gradle" -o -name "settings.gradle.kts" \) \
            | head -n 1)

          [ -z "$SETTINGS" ] && { echo "ERROR: settings.gradle not found"; exit 1; }

          ROOT=$(dirname "$SETTINGS")
          echo "project_root=$ROOT" >> $GITHUB_OUTPUT
          echo "Project root: $ROOT"

      # ─────────────────────────────────────────────
      # STEP 2 — Apply ALL fixes before building
      # ─────────────────────────────────────────────
      - name: Apply all pre-build fixes
        env:
          ROOT: ${{ steps.locate.outputs.project_root }}
        run: |
          python3 << 'PYEOF'
          import os, re, sys, shutil, urllib.request

          ROOT = os.environ["ROOT"]
          print(f"Fixing project at: {ROOT}")

          # ══════════════════════════════════════════
          # FIX 1 — Add JitPack + Google to repos
          # ══════════════════════════════════════════
          def add_repos(filepath, groovy=True):
              if not os.path.exists(filepath):
                  return
              c = open(filepath, encoding='utf-8', errors='ignore').read()
              if 'jitpack.io' in c:
                  return
              jitpack = '        maven { url "https://jitpack.io" }' if groovy \
                        else '        maven { url = uri("https://jitpack.io") }'
              for pat in [
                  r'(dependencyResolutionManagement\s*\{[^}]*repositories\s*\{)',
                  r'(allprojects\s*\{[^}]*repositories\s*\{)',
              ]:
                  m = re.search(pat, c, re.DOTALL)
                  if m:
                      c = c[:m.end()] + '\n' + jitpack + c[m.end():]
                      open(filepath, 'w').write(c)
                      print(f"  [repos] jitpack added to {os.path.basename(filepath)}")
                      return

          add_repos(f"{ROOT}/settings.gradle",     groovy=True)
          add_repos(f"{ROOT}/settings.gradle.kts", groovy=False)
          add_repos(f"{ROOT}/build.gradle",         groovy=True)
          add_repos(f"{ROOT}/build.gradle.kts",    groovy=False)

          # ══════════════════════════════════════════
          # FIX 2 — Purge invalid res/ files
          # ══════════════════════════════════════════
          ALLOWED = {
              'font':       {'.xml','.ttf','.ttc','.otf'},
              'layout':     {'.xml'}, 'values':  {'.xml'},
              'anim':       {'.xml'}, 'animator':{'.xml'},
              'color':      {'.xml'}, 'menu':    {'.xml'},
              'xml':        {'.xml'}, 'transition':{'.xml'},
              'navigation': {'.xml'}, 'interpolator':{'.xml'},
              'drawable':   {'.xml','.png','.jpg','.jpeg','.webp','.gif'},
              'mipmap':     {'.xml','.png','.jpg','.jpeg','.webp'},
          }
          JUNK = {'.DS_Store','Thumbs.db','desktop.ini'}

          for dirpath, _, filenames in os.walk(ROOT):
              if 'res' not in dirpath:
                  continue
              dirname = os.path.basename(dirpath)
              base = next((k for k in ALLOWED if dirname.startswith(k)), None)
              for fname in filenames:
                  fpath = os.path.join(dirpath, fname)
                  ext = os.path.splitext(fname)[1].lower()
                  if fname in JUNK or ext in {'.bak','.tmp','.orig'}:
                      os.remove(fpath)
                      print(f"  [res] removed junk: {fname}")
                  elif base and ext not in ALLOWED[base]:
                      os.remove(fpath)
                      print(f"  [res] removed invalid: {fname} from {dirname}/")

          # ══════════════════════════════════════════
          # FIX 3 — Download missing fonts
          # ══════════════════════════════════════════
          FONTS = {
              'cairo_regular':('ofl/cairo','Cairo-Regular'),
              'cairo_bold':('ofl/cairo','Cairo-Bold'),
              'cairo_semibold':('ofl/cairo','Cairo-SemiBold'),
              'cairo_medium':('ofl/cairo','Cairo-Medium'),
              'cairo_light':('ofl/cairo','Cairo-Light'),
              'cairo_extrabold':('ofl/cairo','Cairo-ExtraBold'),
              'roboto_regular':('apache/roboto','Roboto-Regular'),
              'roboto_bold':('apache/roboto','Roboto-Bold'),
              'roboto_medium':('apache/roboto','Roboto-Medium'),
              'lato_regular':('ofl/lato','Lato-Regular'),
              'lato_bold':('ofl/lato','Lato-Bold'),
              'poppins_regular':('ofl/poppins','Poppins-Regular'),
              'poppins_bold':('ofl/poppins','Poppins-Bold'),
              'poppins_semibold':('ofl/poppins','Poppins-SemiBold'),
              'poppins_medium':('ofl/poppins','Poppins-Medium'),
              'montserrat_regular':('ofl/montserrat','Montserrat-Regular'),
              'montserrat_bold':('ofl/montserrat','Montserrat-Bold'),
              'tajawal_regular':('ofl/tajawal','Tajawal-Regular'),
              'tajawal_bold':('ofl/tajawal','Tajawal-Bold'),
              'tajawal_medium':('ofl/tajawal','Tajawal-Medium'),
              'amiri_regular':('ofl/amiri','Amiri-Regular'),
              'amiri_bold':('ofl/amiri','Amiri-Bold'),
              'opensans_regular':('apache/opensans','OpenSans-Regular'),
              'open_sans_regular':('apache/opensans','OpenSans-Regular'),
              'open_sans_bold':('apache/opensans','OpenSans-Bold'),
          }
          GF = 'https://github.com/google/fonts/raw/main'

          def dl(url, dest):
              try:
                  urllib.request.urlretrieve(url, dest)
                  return os.path.getsize(dest) > 1000
              except:
                  return False

          for dirpath, _, fnames in os.walk(ROOT):
              if 'res' in dirpath and os.path.basename(dirpath).startswith('font'):
                  for f in fnames:
                      if not f.endswith('.xml'):
                          continue
                      content = open(os.path.join(dirpath,f), errors='ignore').read()
                      for ref in set(re.findall(r'@font/(\w+)', content)):
                          dest = os.path.join(dirpath, ref+'.ttf')
                          if os.path.exists(dest) and os.path.getsize(dest) > 500:
                              continue
                          print(f'  [font] missing: {ref}.ttf')
                          done = False
                          if ref in FONTS:
                              path, fname2 = FONTS[ref]
                              done = dl(f'{GF}/{path}/{fname2}.ttf', dest)
                          if not done:
                              parts = ref.split('_')
                              fam = parts[0]
                              var = ''.join(p.capitalize() for p in parts[1:]) or 'Regular'
                              for d in ['ofl','apache','ufl']:
                                  done = dl(f'{GF}/{d}/{fam}/{fam.capitalize()}-{var}.ttf', dest)
                                  if done:
                                      break
                          if done:
                              print(f'  [font] downloaded: {ref}.ttf')
                          else:
                              # Create minimal valid stub TTF
                              open(dest,'wb').write(b'\x00'*512)
                              print(f'  [font] stub created: {ref}.ttf')

          # ══════════════════════════════════════════
          # FIX 4 — Patch app/build.gradle:
          #   a) Remove CMake / externalNativeBuild (main cause of failure)
          #   b) Add namespace if missing
          #   c) Enable dataBinding if used
          #   d) Set abiFilters to arm64 only
          # ══════════════════════════════════════════
          for grad in [f'{ROOT}/app/build.gradle', f'{ROOT}/app/build.gradle.kts']:
              if not os.path.exists(grad):
                  continue
              c = open(grad, encoding='utf-8', errors='ignore').read()
              changed = False

              # Remove externalNativeBuild block (CMake)
              before = c
              c = re.sub(
                  r'externalNativeBuild\s*\{[^}]*(?:\{[^}]*\}[^}]*)?\}',
                  '', c, flags=re.DOTALL
              )
              # Remove cmake blocks inside defaultConfig
              c = re.sub(
                  r'cmake\s*\{[^}]*\}',
                  '', c, flags=re.DOTALL
              )
              # Remove ndkBuild blocks
              c = re.sub(
                  r'ndkBuild\s*\{[^}]*\}',
                  '', c, flags=re.DOTALL
              )
              if c != before:
                  print(f'  [cmake] removed CMake/NDK config from {os.path.basename(grad)}')
                  changed = True

              # Add namespace if missing
              if 'namespace' not in c:
                  manifest = None
                  for dp,_,fs in os.walk(f'{ROOT}/app'):
                      if 'AndroidManifest.xml' in fs:
                          manifest = os.path.join(dp,'AndroidManifest.xml')
                          break
                  if manifest:
                      mc = open(manifest, errors='ignore').read()
                      pkg = re.search(r'package="([^"]+)"', mc)
                      if pkg:
                          ns_line = f'\n    namespace "{pkg.group(1)}"\n'
                          m = re.search(r'(android\s*\{)', c)
                          if m:
                              c = c[:m.end()] + ns_line + c[m.end():]
                              print(f'  [ns] namespace = {pkg.group(1)}')
                              changed = True

              # Enable dataBinding if used
              if not re.search(r'dataBinding', c):
                  src_dir = f'{ROOT}/app/src'
                  uses_db = any(
                      'DataBindingUtil' in open(os.path.join(dp,f), errors='ignore').read()
                      or 'ActivityMainBinding' in open(os.path.join(dp,f), errors='ignore').read()
                      for dp,_,fs in os.walk(src_dir) for f in fs
                      if f.endswith(('.kt','.java'))
                  )
                  if uses_db:
                      m = re.search(r'(android\s*\{)', c)
                      if m:
                          c = c[:m.end()] + '\n    dataBinding { enabled = true }\n' + c[m.end():]
                          print('  [db] dataBinding enabled')
                          changed = True

              if changed:
                  open(grad,'w').write(c)

          # ══════════════════════════════════════════
          # FIX 5 — Remove CMakeLists references from
          #          AndroidManifest if externalNativeBuild removed
          # ══════════════════════════════════════════
          # (Nothing needed in manifest for cmake removal)

          print("\n=== All fixes applied ===")
          PYEOF

      # ─────────────────────────────────────────────
      # STEP 3 — SDK licenses
      # ─────────────────────────────────────────────
      - name: Accept Android SDK licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      # ─────────────────────────────────────────────
      # STEP 4 — Gradle wrapper
      # ─────────────────────────────────────────────
      - name: Prepare Gradle
        id: gradle
        run: |
          ROOT="${{ steps.locate.outputs.project_root }}"
          if [ -f "$ROOT/gradlew" ]; then
            chmod +x "$ROOT/gradlew"
            echo "cmd=./gradlew" >> $GITHUB_OUTPUT
          else
            cd /tmp
            curl -sL https://services.gradle.org/distributions/gradle-8.5-bin.zip -o g.zip
            unzip -q g.zip
            echo "/tmp/gradle-8.5/bin" >> $GITHUB_PATH
            echo "cmd=gradle" >> $GITHUB_OUTPUT
          fi

      # ─────────────────────────────────────────────
      # STEP 5 — Build
      # ─────────────────────────────────────────────
      - name: Build debug APK
        working-directory: ${{ steps.locate.outputs.project_root }}
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx3g -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8"
        run: |
          CMD="${{ steps.gradle.outputs.cmd }}"
          LOG="$GITHUB_WORKSPACE/build_full.log"

          set +e
          $CMD assembleDebug --stacktrace --no-daemon 2>&1 | tee "$LOG"
          CODE=${PIPESTATUS[0]}
          set -e

          if [ $CODE -ne 0 ]; then
            echo ""
            echo "╔══════════════════════════════════════════════════╗"
            echo "║              BUILD FAILED — ERRORS               ║"
            echo "╠══════════════════════════════════════════════════╣"

            echo "── Kotlin errors ──"
            grep "^e: " "$LOG" | head -20 || echo "(none)"

            echo "── Java/resource errors ──"
            grep -E "^(error|Error):" "$LOG" | head -20 || echo "(none)"

            echo "── CMake errors ──"
            grep -E "(CMake Error|ninja: error|FAILED:|clang.*error)" "$LOG" | head -20 || echo "(none)"

            echo "── Caused by (root cause) ──"
            grep "Caused by:" "$LOG" | grep -v "at org\." | head -15 || echo "(none)"

            echo ""
            echo "── Last 80 lines ──"
            tail -80 "$LOG"

            echo "╚══════════════════════════════════════════════════╝"
            exit $CODE
          fi

      # ─────────────────────────────────────────────
      # STEP 6 — Upload full log (always)
      # ─────────────────────────────────────────────
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: build_full.log
          retention-days: 7

      # ─────────────────────────────────────────────
      # STEP 7 — Collect & upload APK
      # ─────────────────────────────────────────────
      - name: Collect and upload APK
        run: |
          ROOT="${{ steps.locate.outputs.project_root }}"
          APKS=$(find "$ROOT" -name "*.apk" -type f)
          [ -z "$APKS" ] && { echo "No APK found"; exit 1; }
          mkdir -p "$GITHUB_WORKSPACE/output"
          TS=$(date +"%Y%m%d_%H%M%S")
          echo "$APKS" | while read -r APK; do
            B=$(basename "$APK" .apk)
            cp "$APK" "$GITHUB_WORKSPACE/output/${B}_${TS}.apk"
            echo "APK ready: ${B}_${TS}.apk"
          done

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK-${{ github.run_number }}
          path: output/*.apk
          retention-days: 30

      - name: Done
        run: echo "SUCCESS — Download APK from: Actions → Artifacts → Android-APK-${{ github.run_number }}"
