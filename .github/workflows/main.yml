name: Build APK From ZIP

on:
  workflow_dispatch:
  push:
    branches: [ "main", "رئيسي" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unzip and Prepare Project
        run: |
          # 1. البحث عن أي ملف زيب وفكه
          ZIP_FILE=$(ls *.zip | head -n 1)
          unzip "$ZIP_FILE" -d temp_data
          
          # 2. البحث عن المجلد الحقيقي الذي يحتوي على ملف settings.gradle
          # سننقل كل الملفات للمسار الرئيسي ليعمل النظام
          CONF_FILE=$(find temp_data -name "settings.gradle" | head -n 1)
          PROJECT_DIR=$(dirname "$CONF_FILE")
          cp -rn "$PROJECT_DIR"/* .
          
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # هذه هي الخطوة السحرية: تثبيت أحدث محرك (Gradle 8.5)
      - name: Setup Gradle (Modern Version)
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Build APK with Modern Gradle
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: My-Badass-App
          path: "**/build/outputs/apk/debug/*.apk"
