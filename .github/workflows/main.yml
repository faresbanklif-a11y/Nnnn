name: Build Android APK from ZIP

on:
  push:
    paths:
      - 'project.zip'
      - '**.gradle'
      - '**.java'
      - '**.kt'
      - '**.xml'
  workflow_dispatch:
    inputs:
      zip_file:
        description: 'Path to the ZIP file inside the repo (e.g. project.zip)'
        required: false
        default: 'project.zip'

jobs:
  build:
    name: Extract ZIP and Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Detect ZIP file
        id: find_zip
        run: |
          ZIP="${{ github.event.inputs.zip_file }}"
          if [ -z "$ZIP" ]; then
            ZIP=$(find . -maxdepth 2 -name "*.zip" | head -n 1)
          fi
          if [ -z "$ZIP" ]; then
            echo "ERROR: No ZIP file found in the repository."
            exit 1
          fi
          echo "zip_path=$ZIP" >> $GITHUB_OUTPUT
          echo "Found ZIP: $ZIP"

      - name: Extract ZIP file
        run: |
          ZIP="${{ steps.find_zip.outputs.zip_path }}"
          echo "Extracting $ZIP ..."
          mkdir -p extracted_project
          unzip -o "$ZIP" -d extracted_project
          echo "Contents after extraction:"
          ls -la extracted_project/

      - name: Locate Android project root
        id: find_root
        run: |
          ROOT=$(find extracted_project -name "settings.gradle" -o -name "settings.gradle.kts" | head -n 1 | xargs dirname)
          if [ -z "$ROOT" ]; then
            echo "ERROR: Could not find Android project root (no settings.gradle found)."
            echo "ZIP contents:"
            find extracted_project -type f | head -50
            exit 1
          fi
          echo "project_root=$ROOT" >> $GITHUB_OUTPUT
          echo "Android project root: $ROOT"

      # ─────────────────────────────────────────────────────────────────
      # FIX: Remove invalid files from Android resource directories.
      # Android only allows specific file types inside res/ sub-folders:
      #   res/font/   → .xml .ttf .ttc .otf  only
      #   res/raw/    → any file is OK
      #   res/layout/ → .xml only
      #   res/drawable/ res/mipmap/ → .xml .png .jpg .webp only
      #   res/values/ → .xml only
      # Placeholder/readme files (.txt, .md, .DS_Store, Thumbs.db, etc.)
      # will cause "The file name must end with ..." build errors.
      # ─────────────────────────────────────────────────────────────────
      - name: Clean up invalid resource files
        run: |
          ROOT="${{ steps.find_root.outputs.project_root }}"
          echo "=== Cleaning invalid files from res/ directories ==="

          # Remove .txt files from font directory (the exact error you hit)
          find "$ROOT" -path "*/res/font/*.txt" -exec echo "Removing: {}" \; -delete

          # Remove any other non-allowed files from font/
          find "$ROOT" -path "*/res/font/*" \
            ! -name "*.xml" ! -name "*.ttf" ! -name "*.ttc" ! -name "*.otf" \
            -type f \
            -exec echo "Removing invalid font file: {}" \; -delete

          # Remove .txt / .md / .DS_Store from layout/ values/ drawable/ mipmap/ anim/ menu/
          for DIR in layout values drawable mipmap anim menu color xml; do
            find "$ROOT" -path "*/res/${DIR}/*" \
              ! -name "*.xml" \
              -type f \
              -exec echo "Removing invalid ${DIR} file: {}" \; -delete
          done

          # Remove macOS and Windows junk files anywhere in res/
          find "$ROOT" -path "*/res/*" \
            \( -name ".DS_Store" -o -name "Thumbs.db" -o -name "desktop.ini" \) \
            -exec echo "Removing junk file: {}" \; -delete

          echo "=== Cleanup complete ==="

      - name: Make gradlew executable
        run: |
          ROOT="${{ steps.find_root.outputs.project_root }}"
          if [ -f "$ROOT/gradlew" ]; then
            chmod +x "$ROOT/gradlew"
            echo "gradlew found and made executable."
          else
            echo "WARNING: gradlew not found, will try system gradle."
          fi

      - name: Validate Gradle wrapper
        run: |
          ROOT="${{ steps.find_root.outputs.project_root }}"
          if [ -f "$ROOT/gradle/wrapper/gradle-wrapper.properties" ]; then
            echo "gradle-wrapper.properties:"
            cat "$ROOT/gradle/wrapper/gradle-wrapper.properties"
          fi

      - name: Build Debug APK
        working-directory: ${{ steps.find_root.outputs.project_root }}
        run: |
          if [ -f "./gradlew" ]; then
            ./gradlew assembleDebug --stacktrace --no-daemon \
              -Dorg.gradle.jvmargs="-Xmx2g -XX:MaxMetaspaceSize=512m"
          else
            gradle assembleDebug --stacktrace --no-daemon
          fi

      - name: Find generated APK files
        id: find_apk
        run: |
          ROOT="${{ steps.find_root.outputs.project_root }}"
          APK_FILES=$(find "$ROOT" -name "*.apk" -type f)
          if [ -z "$APK_FILES" ]; then
            echo "ERROR: No APK files found after build."
            exit 1
          fi
          echo "Generated APKs:"
          echo "$APK_FILES"
          FIRST_APK=$(echo "$APK_FILES" | head -n 1)
          echo "first_apk=$FIRST_APK" >> $GITHUB_OUTPUT

      - name: Rename APK with timestamp
        id: rename_apk
        run: |
          TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
          SRC="${{ steps.find_apk.outputs.first_apk }}"
          BASENAME=$(basename "$SRC" .apk)
          DEST="output/${BASENAME}_${TIMESTAMP}.apk"
          mkdir -p output
          cp "$SRC" "$DEST"
          echo "apk_output=$DEST" >> $GITHUB_OUTPUT
          echo "APK ready: $DEST"

      - name: Upload APK as GitHub Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SiteForge-APK
          path: output/*.apk
          retention-days: 30

      - name: Print success summary
        run: |
          echo "============================================"
          echo "  BUILD SUCCESSFUL"
          echo "============================================"
          echo "  APK: ${{ steps.rename_apk.outputs.apk_output }}"
          echo ""
          echo "  Download from the Actions tab:"
          echo "  -> Artifacts section -> SiteForge-APK"
          echo "============================================"
