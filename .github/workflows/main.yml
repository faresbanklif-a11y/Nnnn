name: Build APK From ZIP

on:
  workflow_dispatch:
  push:
    branches: [ "main", "رئيسي" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unzip and Fix Repositories
        run: |
          # 1. فك الضغط
          ZIP_FILE=$(ls *.zip | head -n 1)
          unzip "$ZIP_FILE" -d temp_data
          
          # 2. نقل الملفات للمسار الرئيسي
          CONF_FILE=$(find temp_data -name "settings.gradle" | head -n 1)
          PROJECT_DIR=$(dirname "$CONF_FILE")
          cp -rn "$PROJECT_DIR"/* .
          
          # 3. خطوة "الحقن" السحرية: إضافة مخزن JitPack لكل الملفات
          # سنضيفه لملف settings.gradle وملف build.gradle لضمان النجاح
          sed -i '/repositories {/a \        maven { url "https://jitpack.io" }' settings.gradle || true
          sed -i '/repositories {/a \        maven { url "https://jitpack.io" }' build.gradle || true
          
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Build APK (Fixing Dependencies)
        run: |
          chmod +x gradlew || true
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: My-Badass-App
          path: "**/build/outputs/apk/debug/*.apk"
