name: Ultimate Badass APK Builder

on:
  workflow_dispatch:
  push:
    branches: [ "main", "رئيسي" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout GitHub Repository
        uses: actions/checkout@v4

      - name: 2. Smart Unzip and Auto-Structure Fix
        run: |
          # فك الضغط عن أي ملف زيب موجود
          ZIP_FILE=$(ls *.zip | head -n 1)
          if [ -z "$ZIP_FILE" ]; then echo "No ZIP file found!"; exit 1; fi
          unzip -o "$ZIP_FILE" -d extracted_temp
          
          # البحث عن المجلد الذي يحتوي على ملفات البرمجة الحقيقية (build.gradle)
          REAL_PROJECT_DIR=$(find extracted_temp -name "build.gradle" | head -n 1 | xargs dirname)
          
          if [ -z "$REAL_PROJECT_DIR" ]; then
            echo "Error: No Android project found inside the ZIP!"
            exit 1
          fi
          
          # نقل كل شيء للمجلد الرئيسي للعمل
          cp -rn "$REAL_PROJECT_DIR"/. .
          
          # إصلاح أخطاء التسمية (مثل "res font" التي سببت خطأ سابقاً)
          # هذا الأمر يبحث عن أي مجلد به مسافة ويستبدلها بشرطة سفلية
          find . -type d -name "* *" -exec bash -c 'mv "$0" "${0// /_}"' {} \; || true
          
      - name: 3. Set up Java Environment (JDK 17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 4. Inject Missing Repositories (JitPack Fix)
        run: |
          # إضافة مخزن JitPack لحل مشكلة المكتبات المفقودة (مثل MPAndroidChart)
          if [ -f "settings.gradle" ]; then
            sed -i '/repositories {/a \        maven { url "https://jitpack.io" }' settings.gradle || true
          fi
          if [ -f "build.gradle" ]; then
            sed -i '/repositories {/a \        maven { url "https://jitpack.io" }' build.gradle || true
          fi

      - name: 5. Setup Modern Gradle Engine
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: 6. Execute Build (Force System Gradle if needed)
        run: |
          # محاولة التشغيل بالمحرك الأصلي، وإذا فشل نستخدم محرك النظام
          if [ -f "./gradlew" ]; then
            chmod +x gradlew
            ./gradlew assembleDebug --stacktrace
          else
            echo "gradlew not found, using system gradle..."
            gradle assembleDebug --stacktrace
          fi

      - name: 7. Upload the Final Badass APK
        uses: actions/upload-artifact@v4
        with:
          name: My-Powerful-App
          path: "**/build/outputs/apk/debug/*.apk"
