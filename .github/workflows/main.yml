name: Build APK From ZIP

on:
  workflow_dispatch:
  push:
    branches: [ "main", "رئيسي" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unzip and Smart-Fix Project Structure
        run: |
          # 1. البحث عن أي ملف زيب وفكه في مجلد مؤقت
          ZIP_FILE=$(ls *.zip | head -n 1)
          unzip "$ZIP_FILE" -d temp_extraction
          
          # 2. البحث عن المجلد الذي يحتوي على ملف settings.gradle (قلب المشروع)
          # هذا السطر سيبحث في كل مكان تحت المجلد المستخرج
          PROJECT_ROOT=$(find temp_extraction -name "settings.gradle" -exec dirname {} \; | head -n 1)
          
          if [ -z "$PROJECT_ROOT" ]; then
            echo "خطأ: لم يتم العثور على ملفات مشروع أندرويد صالحة داخل الزيب!"
            ls -R temp_extraction # لطباعة الملفات للتشخيص
            exit 1
          fi
          
          echo "تم العثور على المشروع في: $PROJECT_ROOT"
          
          # 3. نقل كل محتويات المشروع (بما في ذلك الملفات المخفية) إلى المسار الرئيسي
          cp -r "$PROJECT_ROOT"/. .
          
          # 4. إعطاء صلاحية التشغيل للمحرك
          chmod +x gradlew || true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build Debug APK
        run: |
          # محاولة البناء مع التأكد من وجود الملف
          if [ -f "./gradlew" ]; then
            ./gradlew assembleDebug
          else
            echo "لا يزال ملف gradlew غير موجود في المسار الرئيسي!"
            ls -F
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: My-Badass-App
          path: "**/build/outputs/apk/debug/*.apk"
