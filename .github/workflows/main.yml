name: Build APK From ZIP

on:
  workflow_dispatch:
  push:
    branches: [ "main", "رئيسي" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unzip and Auto-Fix Path
        run: |
          # البحث عن أي ملف زيب وفكه
          ZIP_FILE=$(ls *.zip | head -n 1)
          unzip "$ZIP_FILE" -d temp_folder
          
          # البحث عن ملف gradlew (المحرك) في أي مكان داخل المجلد المستخرج
          GRADLEW_FILE=$(find temp_folder -name gradlew | head -n 1)
          
          if [ -z "$GRADLEW_FILE" ]; then
            echo "خطأ: لم يتم العثور على ملفات المشروع داخل الزيب!"
            exit 1
          fi
          
          # الحصول على المجلد الذي يحتوي على المشروع فعلياً
          PROJECT_ROOT=$(dirname "$GRADLEW_FILE")
          
          # نقل كل المحتويات للمجلد الرئيسي ليعمل الروبوت
          cp -r "$PROJECT_ROOT"/* .
          chmod +x gradlew

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: My-Finished-App
          path: app/build/outputs/apk/debug/*.apk
